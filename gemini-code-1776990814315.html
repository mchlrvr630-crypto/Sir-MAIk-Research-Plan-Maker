<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v10.0 | Advanced Research Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: var(--text); display: flex; gap: 20px; justify-content: center; }
        
        /* Main Container */
        .container { flex: 1; max-width: 900px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); padding-bottom: 30px; }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 30px; }
        
        /* History Sidebar */
        .history-sidebar { width: 300px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; height: fit-content; border-top: 10px solid #555; }
        .history-item { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .history-item:hover { background: #eef4fc; border-color: var(--primary); }
        .clear-btn { background: #d9534f; padding: 10px; margin-top: 10px; font-size: 0.9rem; }
        .clear-btn:hover { background: #c9302c; }

        /* Form Elements */
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .full { grid-column: span 2; }
        
        /* Buttons */
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #003366; }
        
        .export-controls { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-pdf { background: #d9534f; } .btn-pdf:hover { background: #c9302c; }
        .btn-word { background: #2b579a; } .btn-word:hover { background: #1e3e6e; }
        .btn-excel { background: #217346; } .btn-excel:hover { background: #175232; }

        /* Output Table */
        #output-area { margin-top: 30px; display: none; }
        .styled-table { border-collapse: collapse; margin: 25px 0; font-size: 0.95em; width: 100%; box-shadow: 0 0 20px rgba(0, 0, 0, 0.05); border-radius: 8px; overflow: hidden; }
        .styled-table thead tr { background-color: var(--primary); color: #ffffff; text-align: left; }
        .styled-table th, .styled-table td { padding: 15px 20px; vertical-align: top; }
        .styled-table tbody tr { border-bottom: 1px solid #dddddd; }
        .styled-table tbody tr:nth-of-type(even) { background-color: #f8f9fa; }
        .styled-table tbody td:first-child { font-weight: bold; width: 20%; color: var(--primary); }
        .styled-table h4 { margin-top: 0; color: var(--primary); }
        
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Polished Frameworks for Social Science, Education, and Business</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Parameters</div>
        <div class="grid">
            <div class="input-box">
                <label>Independent Variable (IV)</label>
                <input type="text" id="iv" placeholder="e.g., Financial Literacy">
            </div>
            <div class="input-box">
                <label>Dependent Variable (DV)</label>
                <input type="text" id="dv" placeholder="e.g., Investment Behavior">
            </div>
            <div class="input-box">
                <label>IV Indicators (Sub-variables)</label>
                <input type="text" id="ivSub" placeholder="e.g., Budgeting, Saving, Debt Mgmt">
            </div>
            <div class="input-box">
                <label>DV Indicators (Sub-variables)</label>
                <input type="text" id="dvSub" placeholder="e.g., Risk Tolerance, Portfolio Diversification">
            </div>
        </div>

        <div class="section-title">II. Contextual Design</div>
        <div class="grid">
            <div class="input-box">
                <label>Target Respondents</label>
                <input type="text" id="respondents" placeholder="e.g., Public School Teachers, Small Business Owners">
            </div>
            <div class="input-box">
                <label>Research Locale</label>
                <input type="text" id="locale" placeholder="e.g., Manila, Philippines">
            </div>
            <div class="input-box full">
                <label>Brief Study Goal</label>
                <textarea id="goal" placeholder="Explain what you want to find out in 1-2 sentences..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()" id="genBtn">Generate Research Plan</button>
        <div id="loading" class="loading">⚙️ Analyzing parameters and drafting frameworks...</div>

        <div class="export-controls" id="export-controls">
            <button class="btn-word" onclick="exportTable('word')">📄 Export to Word</button>
            <button class="btn-pdf" onclick="exportTable('pdf')">📕 Export to PDF</button>
            <button class="btn-excel" onclick="exportTable('excel')">📊 Export to Excel</button>
        </div>

        <div id="output-area">
            <table class="styled-table" id="research-table">
                <thead>
                    <tr>
                        <th>Research Tasks</th>
                        <th>Detailed Plan / Output</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="history-sidebar">
    <h3 style="margin-top:0; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 10px;">History (Last 5)</h3>
    <div id="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear History</button>
</div>

<script>
// --- Initialization ---
document.addEventListener("DOMContentLoaded", loadHistory);

// --- Core Generation Logic ---
async function generateResearch() {
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Enter your Gemini API Key:");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    const iv = document.getElementById('iv').value;
    const dv = document.getElementById('dv').value;
    
    // UI states
    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";
    document.getElementById('export-controls').style.display = "none";
    document.getElementById('genBtn').disabled = true;

    const promptText = `Act as an Expert Academic Consultant.
    The current year is 2026. All references MUST be strictly between 2021 and 2026.
    
    IV: ${iv} (Indicators: ${document.getElementById('ivSub').value})
    DV: ${dv} (Indicators: ${document.getElementById('dvSub').value})
    Respondents: ${document.getElementById('respondents').value}
    Locale: ${document.getElementById('locale').value}
    Goal: ${document.getElementById('goal').value}

    Provide the output in STRICT JSON format with EXACTLY the following 5 keys. Format the string values with basic HTML (like <br>, <strong>, <ul>) for readability:
    1. "3 Proposed Titles"
    2. "Rationale": Include local and foreign literature, the reason it is a must to conduct the study, and expected outcomes.
    3. "Research Questions": Specific, numbered questions.
    4. "Methodology": Include Research Design, Procedures, and Statistical Tools. **CRITICAL:** Aside from discussing the tests, provide step-by-step instructions on how to run them in Jamovi (from encoding data to analysis).
    5. "References": APA 7th format. Strictly 5 years backward from 2026 (2021-2026).`;

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseMimeType: "application/json" } // Forces JSON output
            })
        });
        
        const data = await response.json();
        if(data.error) throw new Error(data.error.message);

        const aiResponseJSON = JSON.parse(data.candidates[0].content.parts[0].text);
        renderTable(aiResponseJSON);
        saveToHistory(`${iv} vs ${dv}`, aiResponseJSON);

    } catch (err) {
        alert("Error generating research: " + err.message);
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('genBtn').disabled = false;
    }
}

// --- Rendering Logic ---
function renderTable(dataObj) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = ""; // Clear old

    for (const [task, answer] of Object.entries(dataObj)) {
        const row = `<tr>
            <td>${task}</td>
            <td>${answer}</td>
        </tr>`;
        tbody.innerHTML += row;
    }
    
    document.getElementById('output-area').style.display = "block";
    document.getElementById('export-controls').style.display = "grid";
}

// --- Export Functions ---
function exportTable(type) {
    const table = document.getElementById("research-table");
    
    if (type === 'excel') {
        const wb = XLSX.utils.table_to_book(table, {sheet: "Research Plan"});
        XLSX.writeFile(wb, "Research_Architect_Plan.xlsx");
    } 
    else if (type === 'pdf') {
        const opt = {
            margin:       0.5,
            filename:     'Research_Architect_Plan.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(table).save();
    }
    else if (type === 'word') {
        // Create a blob containing the HTML table to export as Word
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title></head><body>";
        const footer = "</body></html>";
        const html = header + table.outerHTML + footer;
        
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'Research_Architect_Plan.doc';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}

// --- History Logic ---
function saveToHistory(title, jsonData) {
    let history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    
    // Add new item to the beginning
    const newItem = {
        id: Date.now(),
        title: title || "Untitled Study",
        date: new Date().toLocaleString(),
        data: jsonData
    };
    
    history.unshift(newItem);
    
    // Keep only the last 5
    if (history.length > 5) history.pop();
    
    localStorage.setItem("gamai_history", JSON.stringify(history));
    loadHistory();
}

function loadHistory() {
    const history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    if(history.length === 0) {
        list.innerHTML = "<p style='color:#777; font-size:0.9rem;'>No history yet.</p>";
        return;
    }

    history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<strong>${item.title}</strong><br><small style="color:#666;">${item.date}</small>`;
        div.onclick = () => renderTable(item.data);
        list.appendChild(div);
    });
}

function clearHistory() {
    if(confirm("Are you sure you want to clear your saved history?")) {
        localStorage.removeItem("gamai_history");
        document.getElementById('table-body').innerHTML = "";
        document.getElementById('output-area').style.display = "none";
        document.getElementById('export-controls').style.display = "none";
        loadHistory();
    }
}
</script>
</body>
</html>
