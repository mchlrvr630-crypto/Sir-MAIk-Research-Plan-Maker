<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v10.6 | Advanced Research Architect</title>

    <style>
        /* Clean Blue and White Palette */
        :root { 
            --bg-page: #f4f7fa; 
            --bg-panel: #ffffff; 
            --primary: #004a99; 
            --primary-light: #e6f0fa;
            --accent: #0066cc; 
            --text-main: #333333;
            --text-muted: #666666;
            --border: #d1dbe8;
            --btn-add: #28a745;
            --btn-del: #dc3545;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-page); 
            padding: 20px; 
            color: var(--text-main); 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            line-height: 1.5;
        }
        
        /* Main Container */
        .container { 
            flex: 1; 
            max-width: 950px; 
            background: var(--bg-panel); 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            border-top: 6px solid var(--primary); 
            padding-bottom: 30px; 
        }
        
        .header { padding: 25px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg-panel); border-radius: 12px 12px 0 0; }
        .header h1 { margin: 0; color: var(--primary); font-weight: 800; }
        .header p { color: var(--text-muted); margin-top: 5px; font-size: 1.05rem; }
        
        .content { padding: 30px; }
        
        /* History Sidebar */
        .history-sidebar { 
            width: 300px; 
            background: var(--bg-panel); 
            border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            padding: 20px; 
            height: fit-content; 
            border-top: 6px solid var(--accent); 
        }
        .history-sidebar h3 { color: var(--primary); border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; margin-top: 0; }
        .history-item { 
            background: var(--bg-page); 
            border: 1px solid var(--border); 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            transition: 0.2s; 
            color: var(--text-main);
        }
        .history-item:hover { border-color: var(--accent); background: var(--primary-light); }
        .clear-btn { background: var(--btn-del); color: white; padding: 10px; margin-top: 10px; font-size: 0.9rem; border: none; border-radius: 6px; width: 100%; cursor: pointer; }
        .clear-btn:hover { background: #b02a37; }

        /* Form Elements */
        .section-title { 
            font-weight: bold; 
            color: var(--primary); 
            border-bottom: 3px solid var(--primary-light); 
            display: inline-block; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            margin-top: 25px; 
            font-size: 1.1rem;
        }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        .full { grid-column: span 2; }
        
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; color: var(--text-main); }
        
        /* Dynamic Variable Group Styling */
        .variable-group {
            display: flex;
            gap: 10px;
            background: var(--primary-light);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            align-items: center;
        }
        
        input, select, textarea { 
            flex: 1;
            padding: 12px; 
            border: 1px solid var(--border); 
            background: #fff;
            color: var(--text-main);
            border-radius: 6px; 
            font-size: 1rem; 
        }
        input::placeholder, textarea::placeholder { color: #999; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
        
        .icon-btn { 
            width: 45px; 
            height: 45px;
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            border-radius: 6px; 
            flex-shrink: 0; 
            font-weight: bold;
            color: white;
            border: none;
            cursor: pointer;
        }
        .add-btn { background: var(--btn-add); margin-bottom: 15px; width: auto; padding: 0 15px; font-size: 1rem; height: 40px; } 
        .add-btn:hover { background: #218838; }
        .remove-btn { background: var(--btn-del); } .remove-btn:hover { background: #c82333; }

        /* Buttons */
        .generate-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(0, 74, 153, 0.2);
            margin-top: 10px;
        }
        .generate-btn:hover { background: var(--accent); }
        .generate-btn:disabled { background: #ccc; cursor: not-allowed; color: #666; box-shadow: none;}
        
        .export-controls { display: none; margin-top: 20px; }
        .btn-export { width: 100%; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem;}
        .btn-word { background: #2b579a; } .btn-word:hover { background: #1e3e6e; }

        /* Output Table Formatting */
        #output-area { margin-top: 35px; display: none; }
        .styled-table { 
            border-collapse: collapse; 
            margin: 20px 0; 
            font-size: 1rem; 
            width: 100%; 
            background: var(--bg-panel);
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        .styled-table thead tr { background-color: var(--primary); color: #ffffff; text-align: left; }
        .styled-table th, .styled-table td { padding: 20px; vertical-align: top; border-bottom: 1px solid var(--border); }
        .styled-table tbody tr:nth-of-type(even) { background-color: var(--bg-page); }
        .styled-table tbody td:first-child { font-weight: bold; width: 22%; color: var(--primary); font-size: 1.05rem;}
        
        /* AI Content Formatting */
        .ai-content p { margin-top: 0; margin-bottom: 15px; }
        .ai-content ul, .ai-content ol { margin-top: 0; margin-bottom: 15px; padding-left: 25px; }
        .ai-content li { margin-bottom: 8px; }
        .ai-content strong { color: var(--primary); }
        .ai-content a { color: var(--accent); text-decoration: none; }
        .ai-content a:hover { text-decoration: underline; }

        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--accent); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Polished Frameworks for Social Science, Education, and Business</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Parameters (Variables)</div>
        <div class="grid">
            
            <div class="input-box" id="iv-container">
                <label>Independent Variables (IV) & Their Indicators</label>
                <div class="variable-group">
                    <input type="text" class="iv-name" placeholder="IV Name (e.g., Financial Literacy)">
                    <input type="text" class="iv-indicators" placeholder="Sub-variables (e.g., Budgeting, Saving)">
                </div>
            </div>
            <button type="button" class="icon-btn add-btn" onclick="addVariableGroup('iv-container', 'iv')">➕ Add Another IV</button>

            <div class="input-box" id="dv-container" style="margin-top: 15px;">
                <label>Dependent Variables (DV) & Their Indicators</label>
                <div class="variable-group">
                    <input type="text" class="dv-name" placeholder="DV Name (e.g., Investment Behavior)">
                    <input type="text" class="dv-indicators" placeholder="Sub-variables (e.g., Risk Tolerance, Diversification)">
                </div>
            </div>
            <button type="button" class="icon-btn add-btn" onclick="addVariableGroup('dv-container', 'dv')">➕ Add Another DV</button>

        </div>

        <div class="section-title">II. Contextual Design</div>
        <div class="grid-2">
            <div class="input-box">
                <label>Target Respondents</label>
                <input type="text" id="respondents" placeholder="e.g., Public School Teachers">
            </div>
            <div class="input-box">
                <label>Research Locale</label>
                <input type="text" id="locale" placeholder="e.g., Manila, Philippines">
            </div>
            <div class="input-box full">
                <label>Brief Study Goal</label>
                <textarea id="goal" rows="3" placeholder="Explain what you want to find out in 1-2 sentences..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()" id="genBtn" class="generate-btn">Generate Research Plan</button>
        <div id="loading" class="loading">⚙️ Analyzing variables, structuring mixed-methods questions, and drafting methodology...</div>

        <div class="export-controls" id="export-controls">
            <button class="btn-export btn-word" onclick="exportTable()">📄 Export Formatted Word Document (.doc)</button>
        </div>

        <div id="output-area">
            <table class="styled-table" id="research-table">
                <thead>
                    <tr>
                        <th>Research Tasks</th>
                        <th>Detailed Plan / Output</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="history-sidebar">
    <h3>History (Last 5)</h3>
    <div id="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear History</button>
</div>

<script>
// --- Initialization ---
document.addEventListener("DOMContentLoaded", loadHistory);

// --- Dynamic Variable Group Logic ---
function addVariableGroup(containerId, type) {
    const container = document.getElementById(containerId);
    const newRow = document.createElement('div');
    newRow.className = 'variable-group';
    newRow.innerHTML = `
        <input type="text" class="${type}-name" placeholder="${type.toUpperCase()} Name">
        <input type="text" class="${type}-indicators" placeholder="Sub-variables (comma separated)">
        <button type="button" class="icon-btn remove-btn" onclick="this.parentElement.remove()">-</button>
    `;
    container.appendChild(newRow);
}

// Extract paired Variable Names and Indicators
function extractVariables(type) {
    const names = document.querySelectorAll(`.${type}-name`);
    const indicators = document.querySelectorAll(`.${type}-indicators`);
    let result = [];
    
    for(let i = 0; i < names.length; i++) {
        const nameVal = names[i].value.trim();
        const indVal = indicators[i].value.trim();
        if(nameVal !== '') {
            result.push(`Variable Name: ${nameVal} | Sub-variables/Indicators: ${indVal || 'None specified'}`);
        }
    }
    return result.join('\n');
}

function getHistoryTitle() {
    const firstIV = document.querySelector('.iv-name').value.trim() || 'IV';
    const firstDV = document.querySelector('.dv-name').value.trim() || 'DV';
    return `${firstIV} vs ${firstDV}`;
}

// --- Core Generation Logic ---
async function generateResearch() {
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Enter your Gemini API Key:");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    const ivData = extractVariables('iv');
    const dvData = extractVariables('dv');
    const respondents = document.getElementById('respondents').value;
    const locale = document.getElementById('locale').value;
    const goal = document.getElementById('goal').value;

    if(!ivData || !dvData) {
        alert("Please provide at least one Independent and one Dependent Variable.");
        return;
    }
    
    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";
    document.getElementById('export-controls').style.display = "none";
    document.getElementById('genBtn').disabled = true;

    const promptText = `Act as an Expert Academic Consultant. The current year is 2026. All references MUST be strictly between 2021 and 2026.
    
    Here is the exact setup of the variables:
    INDEPENDENT VARIABLES (IVs):
    ${ivData}

    DEPENDENT VARIABLES (DVs):
    ${dvData}

    Respondents: ${respondents}
    Locale: ${locale}
    Goal: ${goal}

    CRITICAL FORMATTING AND CONTENT INSTRUCTIONS:
    - Provide the output in STRICT JSON format with EXACTLY 5 keys.
    - Inside the JSON string values, you MUST use heavy HTML formatting to ensure proper spacing. Wrap distinct concepts in <p> tags, use <ul> and <li> for lists, and <br> for line breaks. Ensure ONE ITEM PER LINE so they do not look crowded.
    - DYNAMIC PHRASING: Vary your sentence structures and verbs across the text (e.g., use explore, examine, evaluate, investigate, assess, uncover).

    JSON KEYS REQUIRED:
    1. "3 Proposed Titles": Provide three strong, academic titles. Format as an ordered HTML list (<ol><li>...</li></ol>).
    2. "Rationale": Include local and foreign literature, reason to conduct the study, and expected outcomes. Separate these parts clearly using <p> tags.
    3. "Research Questions": Start with a <p> General Statement. Then use an ordered list. Create a SEPARATE numbered question to describe EACH IV and EACH DV using their sub-bullets (e.g., 1.1, 1.2) on their own lines. Include questions for significant relationship/difference. Include at least ONE Qualitative research question. End with a final question proposing an output/action plan.
    4. "Methodology": Include Research Design and Detailed Procedures (Phase 1, Phase 2, etc.) wrapped in <p> tags. List the specific statistical tool PER QUANTITATIVE RESEARCH QUESTION. Put each RQ statistic on its own line using <p> or <ul>. Provide step-by-step instructions on how to run these specific tests in Jamovi from encoding to analysis.
    5. "References": APA 7th format. Strictly 5 years backward from 2026 (2021-2026). **CRITICAL INSTRUCTION:** ONLY provide references that have a valid, accessible URL or DOI link. You must include the URL or DOI at the end of every citation. Make the links clickable by wrapping them in HTML <a> tags. Format each reference using <p> tags.
    
    IMPORTANT: Return ONLY a valid JSON object. Do not include markdown like \`\`\`json.`;

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseMimeType: "application/json" }
            })
        });
        
        const data = await response.json();
        if(data.error) throw new Error(data.error.message);

        let aiText = data.candidates[0].content.parts[0].text;
        aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();

        const aiResponseJSON = JSON.parse(aiText);
        renderTable(aiResponseJSON);
        saveToHistory(getHistoryTitle(), aiResponseJSON);

    } catch (err) {
        alert("Generation Error: " + err.message + "\n\nTry clearing your history or verifying your API key.");
        if(err.message.includes("API key")) localStorage.removeItem("gamai_key");
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('genBtn').disabled = false;
    }
}

// --- Rendering Logic ---
function renderTable(dataObj) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = ""; 

    for (const [task, answer] of Object.entries(dataObj)) {
        const row = `<tr>
            <td>${task}</td>
            <td class="ai-content">${answer}</td>
        </tr>`;
        tbody.innerHTML += row;
    }
    
    document.getElementById('output-area').style.display = "block";
    document.getElementById('export-controls').style.display = "block"; // Show Word button
}

// --- Polished Export Function (Word Only) ---
function exportTable() {
    const originalTable = document.getElementById("research-table");
    
    // Create a pristine, un-styled clone for formatting
    const cloneTable = originalTable.cloneNode(true);
    
    // Inject strictly formatted Microsoft Word CSS and Title Header
    const header = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <meta charset='utf-8'>
            <title>Export HTML To Doc</title>
            <style>
                body { font-family: 'Calibri', Arial, sans-serif; }
                h1 { text-align: center; color: #004a99; font-size: 24pt; margin-bottom: 20px; }
                table { border-collapse: collapse; width: 100%; }
                th, td { border: 1pt solid #000000; padding: 8pt; vertical-align: top; }
                th { background-color: #004a99; color: #ffffff; font-weight: bold; text-align: left; }
                td { font-size: 11pt; line-height: 1.5; }
                p, ul, ol { margin-top: 0; margin-bottom: 10pt; }
                a { color: #0066cc; text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>Research Plan</h1>
    `;
    const footer = "</body></html>";
    const html = header + cloneTable.outerHTML + footer;
    
    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'Research_Plan.doc';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// --- History Logic ---
function saveToHistory(title, jsonData) {
    let history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    const newItem = { id: Date.now(), title: title || "Untitled Study", date: new Date().toLocaleString(), data: jsonData };
    history.unshift(newItem);
    if (history.length > 5) history.pop();
    localStorage.setItem("gamai_history", JSON.stringify(history));
    loadHistory();
}

function loadHistory() {
    const history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    if(history.length === 0) {
        list.innerHTML = "<p style='color:var(--text-muted); font-size:0.9rem;'>No history yet.</p>";
        return;
    }
    history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<strong>${item.title}</strong><br><small style="color:var(--text-muted);">${item.date}</small>`;
        div.onclick = () => renderTable(item.data);
        list.appendChild(div);
    });
}

function clearHistory() {
    if(confirm("Are you sure you want to clear your saved history?")) {
        localStorage.removeItem("gamai_history");
        document.getElementById('table-body').innerHTML = "";
        document.getElementById('output-area').style.display = "none";
        document.getElementById('export-controls').style.display = "none";
        loadHistory();
    }
}
</script>
</body>
</html>
