<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v10.2 | Advanced Research Architect</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* Dark Blue Palette */
        :root { 
            --bg-dark: #071324; 
            --bg-panel: #0f2545; 
            --primary: #1e4b8f; 
            --accent: #4da3ff; 
            --text-main: #e6f1ff;
            --text-muted: #a3c2eb;
            --border: #213c69;
            --btn-add: #2b7a4b;
            --btn-del: #963535;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-dark); 
            padding: 20px; 
            color: var(--text-main); 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
        }
        
        /* Main Container */
        .container { 
            flex: 1; 
            max-width: 950px; 
            background: var(--bg-panel); 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            border-top: 5px solid var(--accent); 
            padding-bottom: 30px; 
        }
        
        .header { padding: 25px; text-align: center; border-bottom: 1px solid var(--border); }
        .header h1 { margin: 0; color: var(--accent); }
        .header p { color: var(--text-muted); margin-top: 5px; }
        
        .content { padding: 30px; }
        
        /* History Sidebar */
        .history-sidebar { 
            width: 300px; 
            background: var(--bg-panel); 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            padding: 20px; 
            height: fit-content; 
            border-top: 5px solid var(--primary); 
        }
        .history-sidebar h3 { color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; }
        .history-item { 
            background: var(--bg-dark); 
            border: 1px solid var(--border); 
            padding: 10px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            transition: 0.2s; 
            color: var(--text-main);
        }
        .history-item:hover { border-color: var(--accent); background: var(--primary); }
        .clear-btn { background: var(--btn-del); padding: 10px; margin-top: 10px; font-size: 0.9rem; }
        .clear-btn:hover { background: #7a2626; }

        /* Form Elements */
        .section-title { 
            font-weight: bold; 
            color: var(--accent); 
            border-bottom: 2px solid var(--primary); 
            display: inline-block; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            margin-top: 20px; 
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        .full { grid-column: span 2; }
        
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        
        /* Dynamic Inputs */
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { 
            flex: 1;
            padding: 12px; 
            border: 1px solid var(--border); 
            background: var(--bg-dark);
            color: var(--text-main);
            border-radius: 6px; 
            font-size: 1rem; 
        }
        input::placeholder, textarea::placeholder { color: #5a739c; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        
        .icon-btn { 
            width: 45px; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            border-radius: 6px; 
            flex-shrink: 0; 
            font-weight: bold;
        }
        .add-btn { background: var(--btn-add); } .add-btn:hover { background: #1f6139; }
        .remove-btn { background: var(--btn-del); } .remove-btn:hover { background: #7a2626; }

        /* Buttons */
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.05rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: var(--accent); color: #000; }
        button:disabled { background: #333; cursor: not-allowed; color: #777; }
        
        .export-controls { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-pdf { background: #c23e3e; } .btn-pdf:hover { background: #a12f2f; color: white;}
        .btn-word { background: #2b579a; } .btn-word:hover { background: #1e3e6e; color: white;}
        .btn-excel { background: #217346; } .btn-excel:hover { background: #175232; color: white;}

        /* Output Table */
        #output-area { margin-top: 30px; display: none; }
        .styled-table { 
            border-collapse: collapse; 
            margin: 25px 0; 
            font-size: 0.95em; 
            width: 100%; 
            background: var(--bg-dark);
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        .styled-table thead tr { background-color: var(--primary); color: #ffffff; text-align: left; }
        .styled-table th, .styled-table td { padding: 15px 20px; vertical-align: top; border-bottom: 1px solid var(--border); }
        .styled-table tbody tr:nth-of-type(even) { background-color: rgba(255,255,255,0.02); }
        .styled-table tbody td:first-child { font-weight: bold; width: 20%; color: var(--accent); }
        
        .loading { text-align: center; display: none; padding: 20px; font-weight: bold; color: var(--accent); font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Research Architect</h1>
        <p>Polished Frameworks for Social Science, Education, and Business</p>
    </div>

    <div class="content">
        <div class="section-title">I. Study Parameters</div>
        <div class="grid">
            
            <div class="input-box" id="iv-container">
                <label>Independent Variable (IV)</label>
                <div class="input-row">
                    <input type="text" class="iv-input" placeholder="e.g., Financial Literacy">
                    <button type="button" class="icon-btn add-btn" onclick="addInput('iv-container', 'iv-input')">+</button>
                </div>
            </div>

            <div class="input-box" id="dv-container">
                <label>Dependent Variable (DV)</label>
                <div class="input-row">
                    <input type="text" class="dv-input" placeholder="e.g., Investment Behavior">
                    <button type="button" class="icon-btn add-btn" onclick="addInput('dv-container', 'dv-input')">+</button>
                </div>
            </div>

            <div class="input-box" id="ivsub-container">
                <label>IV Indicators (Sub-variables)</label>
                <div class="input-row">
                    <input type="text" class="ivsub-input" placeholder="e.g., Budgeting, Saving">
                    <button type="button" class="icon-btn add-btn" onclick="addInput('ivsub-container', 'ivsub-input')">+</button>
                </div>
            </div>

            <div class="input-box" id="dvsub-container">
                <label>DV Indicators (Sub-variables)</label>
                <div class="input-row">
                    <input type="text" class="dvsub-input" placeholder="e.g., Risk Tolerance">
                    <button type="button" class="icon-btn add-btn" onclick="addInput('dvsub-container', 'dvsub-input')">+</button>
                </div>
            </div>

        </div>

        <div class="section-title">II. Contextual Design</div>
        <div class="grid">
            <div class="input-box">
                <label>Target Respondents</label>
                <input type="text" id="respondents" placeholder="e.g., Public School Teachers">
            </div>
            <div class="input-box">
                <label>Research Locale</label>
                <input type="text" id="locale" placeholder="e.g., Manila, Philippines">
            </div>
            <div class="input-box full">
                <label>Brief Study Goal</label>
                <textarea id="goal" rows="3" placeholder="Explain what you want to find out in 1-2 sentences..."></textarea>
            </div>
        </div>

        <button onclick="generateResearch()" id="genBtn">Generate Research Plan</button>
        <div id="loading" class="loading">⚙️ Analyzing parameters and drafting frameworks...</div>

        <div class="export-controls" id="export-controls">
            <button class="btn-word" onclick="exportTable('word')">📄 Export to Word</button>
            <button class="btn-pdf" onclick="exportTable('pdf')">📕 Export to PDF</button>
            <button class="btn-excel" onclick="exportTable('excel')">📊 Export to Excel</button>
        </div>

        <div id="output-area">
            <table class="styled-table" id="research-table">
                <thead>
                    <tr>
                        <th>Research Tasks</th>
                        <th>Detailed Plan / Output</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="history-sidebar">
    <h3>History (Last 5)</h3>
    <div id="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear History</button>
</div>

<script>
// --- Initialization ---
document.addEventListener("DOMContentLoaded", loadHistory);

// --- Dynamic Input Logic ---
function addInput(containerId, inputClass) {
    const container = document.getElementById(containerId);
    const newRow = document.createElement('div');
    newRow.className = 'input-row';
    newRow.innerHTML = `
        <input type="text" class="${inputClass}" placeholder="Add another...">
        <button type="button" class="icon-btn remove-btn" onclick="this.parentElement.remove()">-</button>
    `;
    container.appendChild(newRow);
}

// Helper to get all values from dynamic inputs as a comma-separated string
function getCombinedValues(className) {
    const inputs = document.querySelectorAll('.' + className);
    let values = [];
    inputs.forEach(input => {
        if(input.value.trim() !== '') values.push(input.value.trim());
    });
    return values.join(', ');
}

// --- Core Generation Logic ---
async function generateResearch() {
    let apiKey = localStorage.getItem("gamai_key");
    if (!apiKey) {
        apiKey = prompt("Enter your Gemini API Key:");
        if (apiKey) localStorage.setItem("gamai_key", apiKey);
        else return;
    }

    // Grab dynamic values
    const iv = getCombinedValues('iv-input');
    const dv = getCombinedValues('dv-input');
    const ivSub = getCombinedValues('ivsub-input');
    const dvSub = getCombinedValues('dvsub-input');
    
    // Grab static values
    const respondents = document.getElementById('respondents').value;
    const locale = document.getElementById('locale').value;
    const goal = document.getElementById('goal').value;

    if(!iv || !dv) {
        alert("Please provide at least one Independent and Dependent Variable.");
        return;
    }
    
    // UI states
    document.getElementById('loading').style.display = "block";
    document.getElementById('output-area').style.display = "none";
    document.getElementById('export-controls').style.display = "none";
    document.getElementById('genBtn').disabled = true;

    const promptText = `Act as an Expert Academic Consultant.
    The current year is 2026. All references MUST be strictly between 2021 and 2026.
    
    IV(s): ${iv} (Indicators: ${ivSub})
    DV(s): ${dv} (Indicators: ${dvSub})
    Respondents: ${respondents}
    Locale: ${locale}
    Goal: ${goal}

    Provide the output in STRICT JSON format with EXACTLY the following 5 keys. Format the string values with basic HTML (like <br>, <strong>, <ul>) for readability inside a table:
    1. "3 Proposed Titles": Provide three strong, academic titles.
    2. "Rationale": Include local and foreign literature, the reason it is a must to conduct the study, and expected outcomes.
    3. "Research Questions": MUST follow this strict format:
       Start with a General Statement describing the study's overall purpose, variables, respondents, and locale (e.g., "This study determines the relationship between..."). Follow with "Specifically, it seeks answers to the following questions:". 
       Create numbered specific questions. For questions asking to describe the IV and DV, use sub-bullets (e.g., 1.1, 1.2) populated by the specific indicators provided (${ivSub} and ${dvSub}). Include questions for significant relationship/difference and an output (e.g., action plan or framework).
    4. "Methodology": Include Research Design and Procedures. 
       **CRITICAL for Statistical Tools:** You MUST list the specific statistical tool PER RESEARCH QUESTION (e.g., "<strong>RQ1:</strong> Mean and Standard Deviation. <strong>RQ2:</strong> Pearson r"). Afterward, provide step-by-step instructions on how to run these specific tests in Jamovi.
    5. "References": APA 7th format. Strictly 5 years backward from 2026 (2021-2026).
    
    IMPORTANT: Return ONLY a valid JSON object. Do not include markdown codeblocks like \`\`\`json.`;

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseMimeType: "application/json" }
            })
        });
        
        const data = await response.json();
        
        // Catch API-level errors (like invalid API key)
        if(data.error) throw new Error(data.error.message);

        // Clean the AI response to ensure it parses correctly even if the AI disobeys the "no markdown" rule
        let aiText = data.candidates[0].content.parts[0].text;
        aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();

        const aiResponseJSON = JSON.parse(aiText);
        renderTable(aiResponseJSON);
        saveToHistory(`${iv} vs ${dv}`, aiResponseJSON);

    } catch (err) {
        alert("Generation Error: " + err.message + "\n\nIf it says API key not valid, click OK, clear your history, or reset the app to enter a new key.");
        // Optional: clear bad key if error is 400 API key not valid
        if(err.message.includes("API key")) {
            localStorage.removeItem("gamai_key");
        }
    } finally {
        document.getElementById('loading').style.display = "none";
        document.getElementById('genBtn').disabled = false;
    }
}

// --- Rendering Logic ---
function renderTable(dataObj) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = ""; 

    for (const [task, answer] of Object.entries(dataObj)) {
        const row = `<tr>
            <td>${task}</td>
            <td>${answer}</td>
        </tr>`;
        tbody.innerHTML += row;
    }
    
    document.getElementById('output-area').style.display = "block";
    document.getElementById('export-controls').style.display = "grid";
}

// --- Export Functions ---
function exportTable(type) {
    const table = document.getElementById("research-table");
    
    // Create a clone of the table to force light colors for export so it's readable on paper
    const cloneTable = table.cloneNode(true);
    cloneTable.style.backgroundColor = "white";
    cloneTable.style.color = "black";
    cloneTable.querySelectorAll("td, th").forEach(cell => {
        cell.style.borderColor = "#ddd";
        if(cell.tagName === "TH") { cell.style.backgroundColor = "#1e4b8f"; cell.style.color = "white"; }
    });

    if (type === 'excel') {
        const wb = XLSX.utils.table_to_book(cloneTable, {sheet: "Research Plan"});
        XLSX.writeFile(wb, "Research_Architect_Plan.xlsx");
    } 
    else if (type === 'pdf') {
        const opt = {
            margin:       0.5,
            filename:     'Research_Architect_Plan.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, backgroundColor: "#ffffff" },
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(cloneTable).save();
    }
    else if (type === 'word') {
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title></head><body>";
        const footer = "</body></html>";
        const html = header + cloneTable.outerHTML + footer;
        
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'Research_Architect_Plan.doc';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}

// --- History Logic ---
function saveToHistory(title, jsonData) {
    let history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    
    const newItem = {
        id: Date.now(),
        title: title || "Untitled Study",
        date: new Date().toLocaleString(),
        data: jsonData
    };
    
    history.unshift(newItem);
    if (history.length > 5) history.pop();
    
    localStorage.setItem("gamai_history", JSON.stringify(history));
    loadHistory();
}

function loadHistory() {
    const history = JSON.parse(localStorage.getItem("gamai_history")) || [];
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    if(history.length === 0) {
        list.innerHTML = "<p style='color:var(--text-muted); font-size:0.9rem;'>No history yet.</p>";
        return;
    }

    history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<strong>${item.title}</strong><br><small style="color:var(--text-muted);">${item.date}</small>`;
        div.onclick = () => renderTable(item.data);
        list.appendChild(div);
    });
}

function clearHistory() {
    if(confirm("Are you sure you want to clear your saved history?")) {
        localStorage.removeItem("gamai_history");
        document.getElementById('table-body').innerHTML = "";
        document.getElementById('output-area').style.display = "none";
        document.getElementById('export-controls').style.display = "none";
        loadHistory();
    }
}
</script>
</body>
</html>
